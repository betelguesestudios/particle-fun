<head>
    <title>yes</title>
</head>
<body>
    <canvas id="canva" width="500" height="500"></canvas>
    <p id="grams"></p>
</body>
<script>
    const canvas = document.getElementById("canva");
    const ctx = canvas.getContext('2d');
    const grams = document.getElementById("grams")
    let yessy;
    let x = 50;
    let y = 50;
    let mousex = 0;
    let mousey = 0;
    let mousedown = false;
    let dots = [
        { x: 50, y: 50, radius: 1, dx: 3, dy: 2},
        { x: 250, y: 250, radius: 1, dx: -2, dy: 3},
        { x: 400, y: 100, radius: 1, dx: 4, dy: -3}
    ];
    window.addEventListener("mouseup", () => {
        mousedown = false;
    });
    canvas.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        mousex = event.clientX - rect.left;
        mousey = event.clientY - rect.top;
    });

    function adddot(x, y) {
        dots.push({
            x: x,
            y: y,
            radius: 1,
            dx: (Math.random() - 0.5) * 8,
            dy: (Math.random() - 0.5) * 8
        });
    }
    function drawdots(dot) {
        ctx.beginPath();
        ctx.arc(dot.x, dot.y, dot.radius, 0, Math.PI * 2)
        ctx.fillStyle = "red"
        ctx.fill();
        ctx.closePath();
    }
    canvas.addEventListener("mousedown", () => {
        mousedown = true;
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
        adddot(mousex, mousey);
    });

    function losphysics() {
        for (let i = 0; i < dots.length; i++) {
            let d = dots[i]
            d.x += d.dx;
            d.y += d.dy;

            if (d.x + d.radius > canvas.width) {
                d.x = canvas.width - d.radius;
                d.dx *= -1;
            } else if (d.x - d.radius < 0) {
                d.x = d.radius;
                d.dx *= -1;
            }

            if (d.y + d.radius > canvas.height) {
                d.y = canvas.height - d.radius;
                d.dy *= -1;
            } else if (d.y - d.radius < 0) {
                d.y = d.radius;
                d.dy *= -1;
            }

            for (let j = i + 1; j < dots.length; j++) {
                let other = dots[j];
                let dx = other.x - d.x;
                let dy = other.y - d.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < d.radius + other.radius) {
                    let overlap = (d.radius + other.radius) - distance;
                    let nx = dx / distance;
                    let ny = dy / distance;
                    d.x -= nx * overlap * 0.5
                    d.y -= ny * overlap * 0.5
                    other.x += nx * overlap * 0.5;
                    other.y += ny * overlap * 0.5;
                    let tempdx = d.dx;
                    let tempdy = d.dy;
                    d.dx = other.dx;
                    d.dy = other.dy;
                    other.dx = tempdx;
                    other.dy = tempdy
                }
            }
        }
    }
    function animateyay() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        losphysics();
        dots.forEach(drawdots);
        yessy = (294 * dots.length) / 602200000000000000000000.00123;
        grams.innerText = `${yessy.toFixed(38)} grams`
        requestAnimationFrame(animateyay);
    }
    animateyay();
</script>
