<head>
    <title>yes</title>
</head>
<body>
    <canvas id="canva" width="500" height="500"></canvas>
</body>
<script>
    const canvas = document.getElementById("canva");
    const ctx = canvas.getContext('2d');
    let x = 50;
    let y = 50;
    const count = 5;

    for (let i = 0; i < count; i++) {
        ctx.fillStyle = "red";
        ctx.fillRect(x, y, 1, 1);
        y += 1;
    }
</script>
