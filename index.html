<!DOCTYPE html>
<head>
    <title>yes</title>
</head>
<body>
    <canvas id="canva" width="500" height="500"></canvas>
    <p id="grams"></p>
    <input type="range" id="numper" min="1" max="294" step="1">
    <p>Atomic weight (moles) <span id="numped">147</span></p>
</body>
<script>
    const canvas = document.getElementById("canva");
    const ctx = canvas.getContext('2d');
    const grams = document.getElementById("grams")
    const width = canvas.width;
    const height = canvas.height;
    const imageData = ctx.createImageData(width, height);
    const pixelData = imageData.data;
    const slider = document.getElementById("numper");
    const output = document.getElementById("numped");
    let yessy = 0;
    let currentAtomicWeight = parseInt(slider.value, 10);
    let x = 50;
    let y = 50;
    let mousex = 0;
    let mousey = 0;
    let mousedown = false;
    let gravityPoint = null;
    let burstPoints = [];
    let dots = [
        { x: 50, y: 50, radius: 1, dx: 3, dy: 2, atomicWeight: 1 },
        { x: 250, y: 250, radius: 1, dx: -2, dy: 3, atomicWeight: 1 },
        { x: 400, y: 100, radius: 1, dx: 4, dy: -3, atomicWeight: 1 }
    ];
    slider.addEventListener('input', (e) => {
        currentAtomicWeight = parseInt(e.target.value, 10);
        output.textContent = currentAtomicWeight;
    });
    window.addEventListener("mouseup", () => {
        mousedown = false;
    });
    canvas.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        mousex = event.clientX - rect.left;
        mousey = event.clientY - rect.top;
    });

    function adddot(x, y) {
        dots.push({
            x: x,
            y: y,
            radius: 1,
            dx: (Math.random() - 0.5) * 8,
            dy: (Math.random() - 0.5) * 8,
            atomicWeight: currentAtomicWeight
        });
    }
    function drawdots(dot) {
        const px = Math.round(dot.x);
        const py = Math.round(dot.y);

        if (px < 0 || px >= width || py < 0 || py >= height) {
            return;
        }
        const index = (py * width + px) * 4;
        pixelData[index] = 255;
        pixelData[index + 1] = 0;
        pixelData[index + 2] = 0;
        pixelData[index + 3] = 255;
    }
    canvas.addEventListener("mousedown", (event) => {
        mousedown = true;
        if (event.ctrlKey) {
            burstPoints.push({
                x: mousex,
                y: mousey,
                radius: 140,
                strength: 15,
                life: 1
            });
        } else if (event.shiftKey) {
            gravityPoint = { x: mousex, y: mousey };
        } else {
            for (let i = 0; i < 20; i++) {
                adddot(mousex, mousey);
            }
        }
    });
    window.addEventListener("keydown", (event) => {
        if (event.key === "Delete" || event.key === "Backspace") {
            gravityPoint = null;
            event.preventDefault();
        }
    });

    function getMassResistance(atomicWeight) {
        return 1 / Math.max(1, atomicWeight / 20);
    }

    function losphysics() {
        for (let i = burstPoints.length - 1; i >= 0; i--) {
            burstPoints[i].life -= 0.04;
            if (burstPoints[i].life <= 0) {
                burstPoints.splice(i, 1);
            }
        }

        for (let i = 0; i < dots.length; i++) {
            let d = dots[i]
            if (gravityPoint) {
                let gx = gravityPoint.x - d.x;
                let gy = gravityPoint.y - d.y;
                let distance = Math.hypot(gx, gy);
                let safeDistance = Math.max(distance, 8);

                if (distance > 0) {
                    let force = 2400 / (safeDistance * safeDistance);
                    force = Math.min(force, 0.5);
                    const massResistance = getMassResistance(d.atomicWeight);
                    d.dx += (gx / safeDistance) * force * massResistance;
                    d.dy += (gy / safeDistance) * force * massResistance;
                }

                let speed = Math.hypot(d.dx, d.dy);
                let maxSpeed = 6;
                if (speed > maxSpeed) {
                    d.dx = (d.dx / speed) * maxSpeed;
                    d.dy = (d.dy / speed) * maxSpeed;
                }

                d.dx *= 0.98;
                d.dy *= 0.98;
            }

            for (const burst of burstPoints) {
                let gx = d.x - burst.x;
                let gy = d.y - burst.y;
                let distance = Math.hypot(gx, gy);
                if (distance < burst.radius) {
                    const influence = 1 - (distance / burst.radius);
                    const push = influence * burst.strength * burst.life;
                    const safeDistance = Math.max(distance, 1);
                    const massResistance = getMassResistance(d.atomicWeight);
                    d.dx += (gx / safeDistance) * push * massResistance;
                    d.dy += (gy / safeDistance) * push * massResistance;
                }
            }

            d.x += d.dx;
            d.y += d.dy;

            if (d.x + d.radius > canvas.width) {
                d.x = canvas.width - d.radius;
                d.dx *= -1;
            } else if (d.x - d.radius < 0) {
                d.x = d.radius;
                d.dx *= -1;
            }

            if (d.y + d.radius > canvas.height) {
                d.y = canvas.height - d.radius;
                d.dy *= -1;
            } else if (d.y - d.radius < 0) {
                d.y = d.radius;
                d.dy *= -1;
            }

            for (let j = i + 1; j < dots.length; j++) {
                let other = dots[j];
                let dx = other.x - d.x;
                let dy = other.y - d.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < d.radius + other.radius) {
                    let overlap = (d.radius + other.radius) - distance;
                    let nx = dx / distance;
                    let ny = dy / distance;
                    d.x -= nx * overlap * 0.5
                    d.y -= ny * overlap * 0.5
                    other.x += nx * overlap * 0.5;
                    other.y += ny * overlap * 0.5;
                    let tempdx = d.dx;
                    let tempdy = d.dy;
                    d.dx = other.dx;
                    d.dy = other.dy;
                    other.dx = tempdx;
                    other.dy = tempdy
                }
            }
        }
    }
    function animateyay() {
        yessy = 0;
        pixelData.fill(0);
        losphysics();
        dots.forEach(drawdots);
        if (gravityPoint) {
            ctx.putImageData(imageData, 0, 0);
            ctx.fillStyle = "blue";
            ctx.beginPath();
            ctx.arc(gravityPoint.x, gravityPoint.y, 5, 0, Math.PI * 2)
            ctx.fill();
        } else {
            ctx.putImageData(imageData, 0, 0);
        }
        dots.forEach(item => {
            yessy += item.atomicWeight / 602200000000000000000000.00123;
        });
        grams.innerText = `${yessy.toFixed(38)} grams`;
        requestAnimationFrame(animateyay);
    }
    animateyay();
</script>
