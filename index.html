<!DOCTYPE html>
<head>
    <title>yes</title>
    <style>
        canvas{
            border: 2px solid black;
        }
    </style>
</head>
<body>
    <canvas id="canva" width="500" height="500"></canvas>
    <p id="grams"></p>
    <button href="/particle-fun/about.html">Learn more about this sim</button>
    <br></br>
    <input type="range" id="numper" min="1" max="294" step="1" value="1">
    <p>Atomic weight (moles) <span id="numped">1</span></p>
    <input type="range" id="ppc" min="1" max="200" step="1" value="100">
    <p>Particles per click <span id="yessy">100</span></p>
    <input type="range" id="stronk" min="1" max="15" step="1" value="8">
    <p>Disturbance force <span id="stonks">8</span></p>
    <input type="range" id="forcelegrav" min="100" max="120000" step="10" value="2400">
    <p>Gravity point force <span id="gravdorce">2400</span></p>
    <input type="range" id="cnavaer" min="1" max="500" step="1" value="500">
    <p>Canvas size <span id="candver">500</span></p>
    <button onclick='dots.length = 0;'>Delete all particles</button>
    <p>Click = Place particles</p>
    <p>Shift + Click = Create/Move gravitational point</p>
    <p>Backspace or Delete = Remove gravitational point</p>
    <p>Ctrl + Click = Create disturbance</p>
</body>
<script>
    const canvas = document.getElementById("canva");
    const ctx = canvas.getContext('2d');
    const grams = document.getElementById("grams")
    let width = canvas.width;
    let height = canvas.height;
    let imageData = ctx.createImageData(width, height);
    let lodatat = imageData.data;
    const slider = document.getElementById("numper");
    const output = document.getElementById("numped");
    const slida = document.getElementById("ppc")
    const outp = document.getElementById("yessy")
    const slide = document.getElementById("stronk")
    const outpt = document.getElementById("stonks")
    const dsadsauefgw4utrefd = document.getElementById("forcelegrav")
    const frovegrave = document.getElementById("gravdorce")
    const inny = document.getElementById("cnavaer")
    const outpy = document.getElementById("candver")
    let yessy = 0;
    let currentwegith = parseInt(slider.value, 10);
    let yespy = parseInt(slida.value, 10)
    let giggly = parseInt(slide.value, 10);
    let graviterpintForce = parseInt(dsadsauefgw4utrefd.value, 10);
    let x = 50;
    let y = 50;
    let mousex = 0;
    let mousey = 0;
    let mousedown = false;
    let graviterpint = null;
    let losbursts = [];
    let dots = [];
    inny.addEventListener('input', (e) => {
        const canvasSize = parseInt(e.target.value, 10);
        outpy.textContent = canvasSize;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        width = canvas.width;
        height = canvas.height;
        imageData = ctx.createImageData(width, height);
        lodatat = imageData.data;
    });
    slide.addEventListener('input', (e) => {
        giggly = parseInt(e.target.value, 10);
        outpt.textContent = giggly;
    });
    slider.addEventListener('input', (e) => {
        currentwegith = parseInt(e.target.value, 10);
        output.textContent = currentwegith;
    });
    slida.addEventListener('input', (e) => {
        yespy = parseInt(e.target.value, 10);
        outp.textContent = yespy
    });
    dsadsauefgw4utrefd.addEventListener('input', (e) => {
        graviterpintForce = parseInt(e.target.value, 10);
        frovegrave.textContent = graviterpintForce;
    });
    window.addEventListener("mouseup", () => {
        mousedown = false;
    });
    canvas.addEventListener("mousemove", (event) => {
        const rect = canvas.getBoundingClientRect();
        mousex = event.clientX - rect.left;
        mousey = event.clientY - rect.top;
    });

    function getlaradlius(wegith) {
        const minwegith = 1;
        const maxwegith = 294;
        const minRadius = 1;
        const maxRadius = 5;
        const normalized = (Math.min(maxwegith, Math.max(minwegith, wegith)) - minwegith) / (maxwegith - minwegith);
        return minRadius + normalized * (maxRadius - minRadius);
    }

    function adddoot(x, y) {
        dots.push({
            x: x,
            y: y,
            radius: getlaradlius(currentwegith),
            dx: (Math.random() - 0.5) * 8,
            dy: (Math.random() - 0.5) * 8,
            wegith: currentwegith
        });
    }
    function drowldoots(dot) {
        const px = Math.round(dot.x);
        const py = Math.round(dot.y);
        const radius = Math.max(1, Math.round(dot.radius));

        if (px - radius < 0 || px + radius >= width || py - radius < 0 || py + radius >= height) {
            return;
        }

        const speedd = Math.hypot(dot.dx, dot.dy);
        const intensity = Math.min(1, speedd / 6);
        const redly = Math.round(255 * intensity);

        for (let oy = -radius; oy <= radius; oy++) {
            for (let ox = -radius; ox <= radius; ox++) {
                if (ox * ox + oy * oy > radius * radius) {
                    continue;
                }

                const drawX = px + ox;
                const drawY = py + oy;
                if (drawX < 0 || drawX >= width || drawY < 0 || drawY >= height) {
                    continue;
                }

                const index = (drawY * width + drawX) * 4;
                lodatat[index] = redly;
                lodatat[index + 1] = 0;
                lodatat[index + 2] = 0;
                lodatat[index + 3] = 255;
            }
        }
    }
    canvas.addEventListener("mousedown", (event) => {
        mousedown = true;
        if (event.ctrlKey) {
            losbursts.push({
                x: mousex,
                y: mousey,
                radius: 140,
                strength: giggly,
                life: 1
            });
        } else if (event.shiftKey) {
            graviterpint = { x: mousex, y: mousey };
        } else {
            for (let i = 0; i < yespy; i++) {
                adddoot(mousex, mousey);
            }
        }
    });
    window.addEventListener("keydown", (event) => {
        if (event.key === "Delete" || event.key === "Backspace") {
            graviterpint = null;
            event.preventDefault();
        }
    });

    function getmasssres(wegith) {
        return 1 / Math.max(1, wegith / 20);
    }

    function losphysics() {
        for (let i = losbursts.length - 1; i >= 0; i--) {
            losbursts[i].life -= 0.04;
            if (losbursts[i].life <= 0) {
                losbursts.splice(i, 1);
            }
        }

        for (let i = 0; i < dots.length; i++) {
            let d = dots[i]
            if (graviterpint) {
                let gx = graviterpint.x - d.x;
                let gy = graviterpint.y - d.y;
                let distance = Math.hypot(gx, gy);
                let safdist = Math.max(distance, 8);

                if (distance > 0) {
                    let force = graviterpintForce / (safdist * safdist);
                    force = Math.min(force, 0.5);
                    const masssres = getmasssres(d.wegith);
                    d.dx += (gx / safdist) * force * masssres;
                    d.dy += (gy / safdist) * force * masssres;
                }

                let speedd = Math.hypot(d.dx, d.dy);
                let maxspeedd = 6;
                if (speedd > maxspeedd) {
                    d.dx = (d.dx / speedd) * maxspeedd;
                    d.dy = (d.dy / speedd) * maxspeedd;
                }

                d.dx *= 0.98;
                d.dy *= 0.98;
            }

            for (const burst of losbursts) {
                let gx = d.x - burst.x;
                let gy = d.y - burst.y;
                let distance = Math.hypot(gx, gy);
                if (distance < burst.radius) {
                    const influence = 1 - (distance / burst.radius);
                    const push = influence * burst.strength * burst.life;
                    const safdist = Math.max(distance, 1);
                    const masssres = getmasssres(d.wegith);
                    d.dx += (gx / safdist) * push * masssres;
                    d.dy += (gy / safdist) * push * masssres;
                }
            }

            d.x += d.dx;
            d.y += d.dy;

            if (d.x + d.radius > canvas.width) {
                d.x = canvas.width - d.radius;
                d.dx *= -1;
            } else if (d.x - d.radius < 0) {
                d.x = d.radius;
                d.dx *= -1;
            }

            if (d.y + d.radius > canvas.height) {
                d.y = canvas.height - d.radius;
                d.dy *= -1;
            } else if (d.y - d.radius < 0) {
                d.y = d.radius;
                d.dy *= -1;
            }

            for (let j = i + 1; j < dots.length; j++) {
                let other = dots[j];
                let dx = other.x - d.x;
                let dy = other.y - d.y;
                let distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < d.radius + other.radius) {
                    let overlap = (d.radius + other.radius) - distance;
                    let nx = dx / distance;
                    let ny = dy / distance;
                    d.x -= nx * overlap * 0.5
                    d.y -= ny * overlap * 0.5
                    other.x += nx * overlap * 0.5;
                    other.y += ny * overlap * 0.5;
                    let tempdx = d.dx;
                    let tempdy = d.dy;
                    d.dx = other.dx;
                    d.dy = other.dy;
                    other.dx = tempdx;
                    other.dy = tempdy
                }
            }
        }
    }
    function animateyay() {
        yessy = 0;
        lodatat.fill(0);
        losphysics();
        dots.forEach(drowldoots);
        if (graviterpint) {
            ctx.putImageData(imageData, 0, 0);
            ctx.fillStyle = "blue";
            ctx.beginPath();
            ctx.arc(graviterpint.x, graviterpint.y, 5, 0, Math.PI * 2)
            ctx.fill();
        } else {
            ctx.putImageData(imageData, 0, 0);
        }
        dots.forEach(item => {
            yessy += item.wegith / 602200000000000000000000  //btw this is avogadros number which is very sigma
        });
        grams.innerText = `${yessy.toFixed(38)} grams`;
        requestAnimationFrame(animateyay);
    }
    animateyay();
</script>
